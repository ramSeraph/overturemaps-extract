<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overture Maps Extract</title>

  <script type="importmap">
  {
    "imports": {
      "apache-arrow": "https://esm.sh/apache-arrow@17.0.0",
      "geoparquet-extractor": "https://esm.sh/geoparquet-extractor@0.2.2",
      "@india-boundary-corrector/maplibre-protocol": "https://esm.sh/@india-boundary-corrector/maplibre-protocol@latest"
    }
  }
  </script>

  <!-- MapLibre GL -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div id="panel" class="panel">
      <button id="panel-toggle" class="panel-toggle" aria-label="Toggle panel">▶</button>

      <div class="panel-header">
        <h2>Overture Maps Extract <a href="https://github.com/ramSeraph/overturemaps-extract" target="_blank" rel="noopener" class="github-link" aria-label="View source on GitHub"><svg height="22" width="22" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a></h2>
        <p class="subtitle">Extract Overture Maps data by bounding box</p>

        <p id="data-release" class="data-release"></p>
      </div>

      <div class="panel-body">

        <div id="loading-indicator" class="loading-indicator">
          <div class="spinner"></div>
          <span>Loading catalog…</span>
        </div>

        <div class="form-group">
          <label for="layer-select">Layer</label>
          <select id="layer-select" disabled>
            <option value="">Loading layers…</option>
          </select>
          <div id="layer-info" class="layer-info"></div>
        </div>

        <div class="extents-checkbox-container">
          <label class="extents-checkbox-label">
            <input type="checkbox" id="show-extents" class="extents-checkbox" />
            Show Data Extents
          </label>
          <span id="extents-status" class="extents-status"></span>
        </div>

        <div class="form-group">
          <label>Current Bounding Box</label>
          <div id="bbox-display" class="bbox-display"></div>
        </div>

        <div class="form-group">
          <label for="format-select">Output Format</label>
          <select id="format-select"></select>
        </div>

        <div class="option-checkbox-container">
          <label class="option-checkbox-label">
            <input type="checkbox" id="flatten-structs" class="option-checkbox" />
            Flatten Structs
          </label>
        </div>

        <details class="form-group" title="Maximum memory DuckDB is allowed to use for processing queries in the browser">
          <summary class="form-label">Memory Limit</summary>
          <input type="range" id="memory-slider" />
          <span id="memory-value"></span>
        </details>

        <div class="license-notice">
          📜 Data is licensed under <a href="https://docs.overturemaps.org/attribution/" target="_blank" rel="noopener">CDLA Permissive 2.0 &amp; ODbL</a>.
          © <a href="https://overturemaps.org" target="_blank" rel="noopener">Overture Maps Foundation</a>.
        </div>

        <div class="button-group">
          <button id="download-btn" class="btn btn-primary" disabled>Download</button>
          <button id="cancel-btn" class="btn btn-cancel" style="display: none">Cancel</button>
        </div>

        <div id="progress-container" style="display: none">
          <div class="progress-bar-outer">
            <div id="progress-bar" class="progress-bar-inner"></div>
          </div>
          <div id="status-text" class="status-text"></div>
          <div id="download-info" class="download-info"></div>
          <p class="size-disclaimer">Sizes shown are estimates and may differ from actual.</p>
        </div>

      </div>

      <div class="panel-footer">
        <div class="footer-powered">Powered by <a href="https://overturemaps.org" target="_blank" rel="noopener">Overture Maps</a></div>
        <div class="footer-links">
          <a href="https://docs.overturemaps.org" target="_blank" rel="noopener">Docs</a>
          <span>·</span>
          <a href="https://github.com/OvertureMaps" target="_blank" rel="noopener">GitHub</a>
          <span>·</span>
          <a href="https://overturemaps.org" target="_blank" rel="noopener">Website</a>
        </div>
      </div>
    </div>
  </div>

  <!-- MapLibre GL JS -->
  <script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>
  <!-- PMTiles protocol for MapLibre -->
  <script src="https://unpkg.com/pmtiles@4.3.0/dist/pmtiles.js"></script>
  <!-- App (ES module) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
